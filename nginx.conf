server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Behind Coolify Traefik (TLS terminated outside). Don't include scheme/host/
    # port in redirects — otherwise /app → /app/ leaks the internal :3000.
    absolute_redirect off;
    port_in_redirect off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml+rss image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Astro generates pretty URLs (e.g. /instagram/index.html) — try those first
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html /index.html;
    }

    # Don't log favicon misses
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
